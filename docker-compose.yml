services:
  tennisreservation.presentation:
    image: ${DOCKER_REGISTRY-}tennisreservationpresentation
    build:
      context: .
      dockerfile: TennisReservation.Presentation/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
     POSTGRES_USER: ${POSTGRES_USER}
     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
     POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: